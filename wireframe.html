<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wireframe Layout</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background-color: white;
    }

    .container {
      width: 900px;
      margin: 0 auto;
      border: 2px solid black;
      padding: 10px;
    }

    .top {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .logo {
      width: 20%;
      height: 80px;
      border: 2px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .navigation {
      width: 80%;
      height: 80px;
      border: 2px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .middle {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .content {
      width: 65%;
      height: 300px;
      border: 2px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .images {
      width: 35%;
      height: 300px;
      border: 2px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .footer {
      height: 70px;
      border: 2px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    h1 {
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Wireframe Layout for My Favorite Website</h1>

  <div class="container">
    <div class="top">
      <div class="logo">Logo</div>
      <div class="navigation">Navigation</div>
    </div>

    <div class="middle">
      <div class="content">Content</div>
      <div class="images">Images</div>
    </div>

    <div class="footer">Footer</div>
  </div>
</body>
</html>
