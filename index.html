<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Wireframe Layout</title>

<style>

body{
font-family: Arial;
margin:40px;
}

.container{
width:900px;
margin:auto;
}

.header{
display:flex;
}

.logo{
width:20%;
height:80px;
border:2px solid black;
display:flex;
align-items:center;
justify-content:center;
}

.navigation{
width:80%;
height:80px;
border:2px solid black;
display:flex;
align-items:center;
justify-content:center;
}

.middle{
display:flex;
margin-top:10px;
}

.content{
width:65%;
height:300px;
border:2px solid black;
display:flex;
align-items:center;
justify-content:center;
}

.images{
width:35%;
height:300px;
border:2px solid black;
display:flex;
align-items:center;
justify-content:center;
}

.footer{
height:80px;
border:2px solid black;
display:flex;
align-items:center;
justify-content:center;
margin-top:10px;
}

</style>

</head>

<body>

<h1>Website Wireframe</h1>

<div class="container">

<div class="header">

<div class="logo">
Logo
</div>

<div class="navigation">
Navigation
</div>

</div>

<div class="middle">

<div class="content">
Content
</div>

<div class="images">
Images
</div>

</div>

<div class="footer">
Footer
</div>

</div>

</body>
</html>
