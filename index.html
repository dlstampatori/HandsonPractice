<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Website Wireframe</title>

<style>

body{
font-family: Arial;
margin:40px;
}

.container{
width:900px;
margin:auto;
border:2px solid black;
padding:10px;
}

.header{
display:flex;
margin-bottom:10px;
}

.logo{
width:20%;
height:80px;
border:2px solid black;
display:flex;
align-items:center;
justify-content:center;
}

.navigation{
width:80%;
height:80px;
border:2px solid black;
display:flex;
align-items:center;
justify-content:center;
}

.middle{
display:flex;
margin-bottom:10px;
}

.content{
width:65%;
height:300px;
border:2px solid black;
display:flex;
align-items:center;
justify-content:center;
}

.images{
width:35%;
height:300px;
border:2px solid black;
display:flex;
align-items:center;
justify-content:center;
}

.footer{
height:80px;
border:2px solid black;
display:flex;
align-items:center;
justify-content:center;
}

</style>
</head>

<body>

<h1>Wireframe Layout</h1>

<div class="container">

<div class="header">
<div class="logo">LOGO</div>
<div class="navigation">NAVIGATION</div>
</div>

<div class="middle">
<div class="content">CONTENT</div>
<div class="images">IMAGES</div>
</div>

<div class="footer">FOOTER</div>

</div>

</body>
</html>
